<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3Dマイクラ - ヒツジ復活版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white; text-align: center;
        }
        #start-button { padding: 18px 50px; font-size: 26px; cursor: pointer; background: #2e7d32; color: white; border: none; border-radius: 8px; box-shadow: 0 6px 0 #1b5e20; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; display: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: none; }
        .slot { width: 45px; height: 45px; border: 2px solid #666; background: #333; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; }
        .selected { border-color: #fff; background: #555; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 style="font-size: 48px;">ULTRA CRAFT</h1>
        <p>ヒツジたちが帰ってきました！<br>草原を走り回っています。</p>
        <button id="start-button">ゲーム開始</button>
    </div>
    <div id="crosshair"></div>
    <div id="hotbar"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const skyColor = 0x87CEEB;
        scene.background = new THREE.Color(skyColor);
        scene.fog = new THREE.Fog(skyColor, 15, 45);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const player = new THREE.Object3D();
        const pitch = new THREE.Object3D();
        player.add(pitch); pitch.add(camera);
        scene.add(player);

        const blockTypes = [
            { name: "草", color: 0x4caf50 }, { name: "土", color: 0x795548 },
            { name: "石", color: 0x757575 }, { name: "木", color: 0x5d4037 },
            { name: "葉", color: 0x2e7d32 }, { name: "水", color: 0x0288d1, opacity: 0.7 }
        ];
        const mats = blockTypes.map(b => new THREE.MeshLambertMaterial({ 
            color: b.color, transparent: b.name === "水", opacity: b.opacity || 1 
        }));

        const hotbar = document.getElementById('hotbar');
        blockTypes.forEach((b, i) => {
            const div = document.createElement('div');
            div.id = `slot${i}`;
            div.className = `slot ${i === 0 ? 'selected' : ''}`;
            div.innerHTML = b.name;
            hotbar.appendChild(div);
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        let blocks = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const edgeGeo = new THREE.EdgesGeometry(boxGeo);
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.1 });

        function addBlock(x, y, z, type) {
            const b = new THREE.Mesh(boxGeo, mats[type]);
            b.position.set(Math.round(x), Math.round(y), Math.round(z));
            if(type !== 5) {
                const edges = new THREE.LineSegments(edgeGeo, edgeMat);
                b.add(edges);
            }
            scene.add(b);
            blocks.push(b);
        }

        // --- ヒツジ（モブ）のロジック ---
        let mobs = [];
        function spawnMob(x, z) {
            const group = new THREE.Group();
            // 体
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 1), new THREE.MeshLambertMaterial({color: 0xffffff}));
            // 頭
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.4), new THREE.MeshLambertMaterial({color: 0xeeeeee}));
            head.position.set(0, 0.3, 0.6);
            group.add(body, head);
            group.position.set(x, 10, z); // 空から登場
            scene.add(group);
            mobs.push({ mesh: group, vy: 0, timer: 0, dir: new THREE.Vector3() });
        }

        function createTree(x, y, z) {
            const trunkHeight = 3;
            for(let i=1; i<=trunkHeight; i++) addBlock(x, y + i, z, 3);
            for(let lx=-1; lx<=1; lx++) {
                for(let ly=0; ly<=1; ly++) {
                    for(let lz=-1; lz<=1; lz++) {
                        addBlock(x+lx, y+trunkHeight+ly+1, z+lz, 4);
                    }
                }
            }
        }

        function generateWorld() {
            blocks.forEach(b => scene.remove(b));
            blocks = [];
            const size = 15;
            for (let x = -size; x <= size; x++) {
                for (let z = -size; z <= size; z++) {
                    const h = Math.floor(Math.sin(x * 0.2) * 1.5 + Math.cos(z * 0.2) * 1.5);
                    addBlock(x, h, z, 0);
                    if (h < -1) addBlock(x, -1, z, 5);
                    if (Math.random() < 0.02 && h >= 0) createTree(x, h, z);
                }
            }
            // ヒツジを3匹出す
            for(let i=0; i<3; i++) spawnMob(Math.random()*10-5, Math.random()*10-5);
            player.position.set(0, 10, 0);
        }

        let selected = 0;
        let gameActive = false;
        const keys = {};

        document.getElementById('start-button').onclick = () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('hotbar').style.display = 'flex';
            document.body.requestPointerLock();
            if(!gameActive) { generateWorld(); gameActive = true; animate(); }
        };

        document.addEventListener('keydown', e => { 
            keys[e.code] = true;
            if(e.key >= '1' && e.key <= '6') {
                document.getElementById(`slot${selected}`).classList.remove('selected');
                selected = parseInt(e.key) - 1;
                document.getElementById(`slot${selected}`).classList.add('selected');
            }
        });
        document.addEventListener('keyup', e => keys[e.code] = false);

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                player.rotation.y -= e.movementX * 0.002;
                pitch.rotation.x -= e.movementY * 0.002;
                pitch.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch.rotation.x));
            }
        });

        window.addEventListener('mousedown', e => {
            if (!document.pointerLockElement || !gameActive) return;
            const ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            const hits = ray.intersectObjects(blocks);
            if (hits.length > 0) {
                if (e.button === 0) {
                    const p = hits[0].object.position.clone().add(hits[0].face.normal);
                    addBlock(p.x, p.y, p.z, selected);
                } else if (e.button === 2) {
                    scene.remove(hits[0].object);
                    blocks.splice(blocks.indexOf(hits[0].object), 1);
                }
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        let p_vy = 0;
        function animate() {
            requestAnimationFrame(animate);
            p_vy -= 0.01;
            player.position.y += p_vy;
            const pray = new THREE.Raycaster(player.position, new THREE.Vector3(0, -1, 0));
            const phit = pray.intersectObjects(blocks);
            if (phit.length > 0 && phit[0].distance < 1.6) {
                p_vy = 0;
                player.position.y += (1.6 - phit[0].distance);
                if (keys['Space']) p_vy = 0.2;
            }

            // ヒツジの物理とAI
            mobs.forEach(m => {
                m.vy -= 0.005;
                m.mesh.position.y += m.vy;
                const mray = new THREE.Raycaster(m.mesh.position, new THREE.Vector3(0, -1, 0));
                const mhit = mray.intersectObjects(blocks);
                if(mhit.length > 0 && mhit[0].distance < 0.5) {
                    m.vy = 0;
                    m.mesh.position.y += (0.5 - mhit[0].distance);
                    if(Math.random() < 0.01) m.vy = 0.12; // たまにジャンプ
                }
                m.timer--;
                if(m.timer <= 0) {
                    m.timer = 100 + Math.random()*200;
                    m.dir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
                }
                m.mesh.position.addScaledVector(m.dir, 0.02);
                m.mesh.lookAt(m.mesh.position.clone().add(m.dir));
            });

            const speed = 0.15;
            if (keys['KeyW']) player.translateZ(-speed);
            if (keys['KeyS']) player.translateZ(speed);
            if (keys['KeyA']) player.translateX(-speed);
            if (keys['KeyD']) player.translateX(speed);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
